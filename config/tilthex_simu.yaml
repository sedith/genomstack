host: localhost
plugin_path: ""

mass: 2.5
geom:
    rotors: 6
    armlen: 0.39
    cf: 12.5e-4
    ct: 2.5e-5
    rx: -20
    rz: -1

components:
    rotorcraft:
        type: rotorcraft
        serial: /tmp/pty-tx
        calib: ""

    mocap:
        type: optitrack
        host: localhost
        port: "1509"
        body: TX

    pom_mocap:
        type: pom
        use_lidar: false

    pom_lidar:
        type: pom
        use_lidar: true

    uavpos:
        type: uavpos
        xyradius: 2
        gain:
            Kpxy: 10
            Kpz: 10
            Kvxy: 20
            Kvz: 20
            Kixy: 0
            Kiz: 0

    uavatt:
        type: uavatt
        gain:
            Kqxy: 15
            Kqz: 15
            Kwxy: 3
            Kwz: 1

    maneuver:
        type: maneuver
        vmax: 3
        wmax: 2
        amax: 5
        dwmax: 3

external_publishers:
    lidar:
        target: pom_lidar
        publisher: measure
        port: measure/imu
        path: /tmp/pom_lidar
